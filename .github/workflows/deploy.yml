name: 리포트 배포
# main 브랜치에 변경이 합쳐질 때마다 리포트를 다시 빌드해 GitHub Pages 로 배포한다.
# (저장소 Settings > Pages > Source 를 "GitHub Actions" 로 한 번 켜 두어야 한다.)
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않도록 한 번에 하나만.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 리포트 빌드
        run: python3 build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
